# ============================================================
# k8s/microservice-a/deployment.yaml
# Microservice A — user-facing API (Node.js)
# Consumes PostgreSQL via Secrets Manager + External Secrets
# ============================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: microservice-a
  labels:
    name: microservice-a
    app.kubernetes.io/part-of: eks-hub-spoke
    pod-security.kubernetes.io/enforce: restricted

---
# ExternalSecret pulls DB creds from AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: microservice-a
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: postgres-credentials
    creationPolicy: Owner
  data:
    - secretKey: DB_HOST
      remoteRef:
        key: prod/postgres/credentials
        property: host
    - secretKey: DB_PORT
      remoteRef:
        key: prod/postgres/credentials
        property: port
    - secretKey: DB_NAME
      remoteRef:
        key: prod/postgres/credentials
        property: dbname
    - secretKey: DB_USER
      remoteRef:
        key: prod/postgres/credentials
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: prod/postgres/credentials
        property: password

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservice-a
  namespace: microservice-a
  labels:
    app: microservice-a
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: microservice-a
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: microservice-a
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: microservice-a-sa
      # Spread across AZs
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: microservice-a
      # Only on app-dedicated nodes
      tolerations:
        - key: dedicated
          value: app
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: In
                    values: ["app"]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z $DB_HOST $DB_PORT; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
          envFrom:
            - secretRef:
                name: postgres-credentials
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: microservice-a
          image: 123456789.dkr.ecr.ap-south-1.amazonaws.com/microservice-a:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: postgres-credentials
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: APP_NAME
              value: microservice-a
            - name: DB_SSL
              value: "true"
            - name: DB_POOL_MIN
              value: "2"
            - name: DB_POOL_MAX
              value: "10"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/startup
              port: 3000
            failureThreshold: 30
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: microservice-a
  namespace: microservice-a
  labels:
    app: microservice-a
spec:
  type: ClusterIP
  selector:
    app: microservice-a
  ports:
    - port: 80
      targetPort: 3000
      name: http

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: microservice-a-hpa
  namespace: microservice-a
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: microservice-a
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: microservice-a-pdb
  namespace: microservice-a
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: microservice-a

---
# ServiceAccount with IRSA (IAM Role for Service Accounts)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: microservice-a-sa
  namespace: microservice-a
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/microservice-a-role

---
# NetworkPolicy — restrict ingress/egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: microservice-a-netpol
  namespace: microservice-a
spec:
  podSelector:
    matchLabels:
      app: microservice-a
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              name: microservice-b   # allow B→A
      ports:
        - port: 3000
  egress:
    # To PostgreSQL
    - ports:
        - port: 5432
    # To DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # To Secrets Manager / AWS APIs via VPC Endpoints
    - ports:
        - port: 443
